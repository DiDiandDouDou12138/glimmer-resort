<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLIMMER OS · 微光管家</title>
<style>
  :root{
    --bg:#eef1f5; --panel:#ffffff; --ink:#2a3038; --sub:#8a94a3;
    --accent:#4a90d9; --line:#dde3ea;
    --evil-bg:#0a0508; --evil-panel:#150a0e; --evil-ink:#e8d5d5;
    --evil-accent:#c1121f; --evil-line:#3a1520;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    background:linear-gradient(160deg,#dfe6ee 0%,#c9d4e0 100%);
    color:var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    transition:background 1.2s;
  }
  body.hijacked{background:linear-gradient(160deg,#0a0508 0%,#1a0510 100%)}

  /* ---------- tablet frame ---------- */
  #tablet{
    width:min(760px,96vw); height:min(88vh,860px);
    background:var(--panel); border-radius:26px;
    border:10px solid #1b1e24;
    box-shadow:0 30px 80px rgba(30,45,70,.35);
    display:flex; flex-direction:column; overflow:hidden; position:relative;
    transition:background .8s, box-shadow .8s, border-color .8s;
  }
  body.hijacked #tablet{
    background:var(--evil-panel);
    border-color:#000;
    box-shadow:0 30px 90px rgba(150,10,30,.45);
    color:var(--evil-ink);
  }

  /* ---------- status bar ---------- */
  #statusbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 26px 8px; font-size:12px; letter-spacing:.12em;
    color:var(--sub); font-family:"SF Mono",Consolas,monospace; flex:none;
  }
  body.hijacked #statusbar{color:#7a4550}
  #statusbar .brand{font-weight:600}
  body.hijacked #statusbar .brand::after{content:" · SYSTEM COMPROMISED"; color:var(--evil-accent)}

  /* ---------- search bar ---------- */
  #searchwrap{padding:14px 26px 10px; flex:none}
  #searchbox{
    display:flex; align-items:center; gap:10px;
    background:var(--bg); border:1px solid var(--line); border-radius:14px;
    padding:13px 18px; transition:all .5s;
  }
  body.hijacked #searchbox{background:#1c0a12; border-color:var(--evil-line)}
  #searchbox svg{flex:none}
  #query{
    flex:1; border:none; outline:none; background:transparent;
    font-size:16px; color:inherit; font-family:inherit;
  }
  #query::placeholder{color:#a7b0bd}
  body.hijacked #query::placeholder{color:#5a3040}
  #gobtn{
    border:none; background:var(--accent); color:#fff; border-radius:10px;
    padding:8px 18px; font-size:14px; cursor:pointer; font-family:inherit;
  }
  body.hijacked #gobtn{background:var(--evil-accent)}
  #hintline{font-size:12px;color:var(--sub);padding:8px 4px 0;min-height:20px}
  body.hijacked #hintline{color:#7a4550}

  /* ---------- results ---------- */
  #results{flex:1; overflow-y:auto; padding:6px 26px 90px; scroll-behavior:smooth}
  #results::-webkit-scrollbar{width:8px}
  #results::-webkit-scrollbar-thumb{background:#c3ccd8;border-radius:4px}
  body.hijacked #results::-webkit-scrollbar-thumb{background:#40151f}

  .card{
    background:var(--bg); border:1px solid var(--line); border-radius:16px;
    padding:22px; margin:14px 0; animation:cardin .45s ease;
    line-height:1.85; font-size:15px;
  }
  @keyframes cardin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card h3{font-size:17px;margin-bottom:10px;font-weight:600}
  .card .tag{
    display:inline-block;font-size:11px;letter-spacing:.15em;color:var(--accent);
    border:1px solid var(--accent);border-radius:6px;padding:2px 8px;margin-bottom:12px;
    font-family:"SF Mono",Consolas,monospace;
  }
  .card .sub{color:var(--sub);font-size:13px}
  .card ul{padding-left:1.4em;margin:6px 0}
  .card .footer-easter{
    margin-top:16px;font-size:11px;color:#b9c1cc;text-align:center;letter-spacing:.05em;
    user-select:text; transition:color .3s;
  }
  .card .footer-easter:hover{color:#6b2233}
  .imgwrap{border-radius:12px;overflow:hidden;margin:12px 0;position:relative;line-height:0}
  .imgwrap svg{width:100%;height:auto;display:block}
  .caption{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.6}

  /* corrupt card */
  .card.corrupt{
    background:#12060c; border-color:var(--evil-line); color:var(--evil-ink);
    box-shadow:0 0 30px rgba(193,18,31,.15) inset;
  }
  .card.corrupt h3{color:#ff5464}
  .card.corrupt .tag{color:var(--evil-accent);border-color:var(--evil-accent)}
  .card.corrupt .sub{color:#8a5560}
  .mono{font-family:"SF Mono",Consolas,monospace;font-size:13px}
  .redact{background:#3a3a3a;color:#3a3a3a;border-radius:3px;padding:0 4px;user-select:none}
  .card.corrupt .redact{background:#2a0a12;color:#2a0a12}
  .log-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
  .log-table td,.log-table th{border:1px solid var(--evil-line);padding:6px 10px;text-align:left}
  .log-table th{color:#c98090}
  .disconnect{
    display:block;margin:18px auto 4px;border:1px solid var(--evil-accent);
    background:transparent;color:var(--evil-accent);border-radius:10px;
    padding:10px 26px;font-size:14px;cursor:pointer;font-family:inherit;
    letter-spacing:.1em;
  }
  .disconnect:hover{background:var(--evil-accent);color:#fff}

  /* keyword pill */
  .kw{color:var(--evil-accent);font-weight:600;cursor:pointer;border-bottom:1px dashed var(--evil-accent)}
  .kw-normal{color:var(--accent);font-weight:600;cursor:pointer;border-bottom:1px dashed var(--accent)}

  /* ---------- flicker text (洗涤→收割) ---------- */
  .flick{position:relative;display:inline-block}
  .flick .a,.flick .b{transition:none}
  .flick .b{
    position:absolute;left:0;top:0;color:#a01020;opacity:0;
    animation:flick 9s infinite steps(1);
  }
  .flick .a{animation:flickA 9s infinite steps(1)}
  @keyframes flick{0%,100%{opacity:0} 61.0%{opacity:1} 61.8%{opacity:0} 62.2%{opacity:1} 62.7%{opacity:0}}
  @keyframes flickA{0%,100%{opacity:1} 61.0%{opacity:0} 61.8%{opacity:1} 62.2%{opacity:0} 62.7%{opacity:1}}

  /* ghost layer inside panorama */
  .ghostlayer{opacity:0;animation:ghostflash 11s infinite steps(1)}
  @keyframes ghostflash{0%,100%{opacity:0} 72.0%{opacity:.85} 72.6%{opacity:0} 73.0%{opacity:.6} 73.4%{opacity:0}}

  /* ---------- hijack fx ---------- */
  #glitchveil{
    position:fixed;inset:0;pointer-events:none;z-index:60;opacity:0;
    background:repeating-linear-gradient(0deg,rgba(255,0,60,.08) 0 2px,transparent 2px 4px);
    mix-blend-mode:screen;
  }
  body.glitching #glitchveil{opacity:1;animation:veil .12s infinite}
  @keyframes veil{0%{transform:translateY(0)}50%{transform:translateY(3px)}100%{transform:translateY(-2px)}}
  body.glitching #tablet{animation:shake .1s infinite}
  @keyframes shake{
    0%{transform:translate(1px,-1px)}25%{transform:translate(-2px,1px)}
    50%{transform:translate(2px,2px)}75%{transform:translate(-1px,-2px)}100%{transform:translate(1px,1px)}
  }
  body.hijacked #results .card.corrupt{animation:cardin .45s ease, rgbsplit 4s infinite}
  @keyframes rgbsplit{
    0%,93%,100%{text-shadow:none}
    94%{text-shadow:-2px 0 #f0f, 2px 0 #0ff}
    95%{text-shadow:2px 0 #f0f, -2px 0 #0ff}
    96%{text-shadow:none}
  }
  /* ---------- scare fx: blackout / face flash / fall / zoom ---------- */
  #blackout{position:fixed;inset:0;background:#000;z-index:80;display:none}
  body.blackout #blackout{display:block}
  #faceflash{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:#000}
  body.faceflash #faceflash{display:flex}
  #faceflash svg{width:min(80vh,92vw);max-width:540px}

  body.falling .card{animation:fallaway .9s cubic-bezier(.5,0,1,.6) forwards}
  body.falling .card:nth-child(2){animation-delay:.07s}
  body.falling .card:nth-child(3){animation-delay:.15s}
  body.falling .card:nth-child(n+4){animation-delay:.22s}
  @keyframes fallaway{to{transform:translateY(120vh) rotate(9deg);opacity:.2}}

  /* deep-water theme (hijack #3) */
  body.hijacked.deep{background:linear-gradient(160deg,#010810 0%,#03141f 100%)}
  body.hijacked.deep #tablet{background:#040e18;box-shadow:0 30px 90px rgba(10,70,110,.5)}
  body.hijacked.deep #searchbox{background:#06141f;border-color:#123048}
  body.hijacked.deep .card.corrupt{background:#04101c;border-color:#123048;box-shadow:0 0 30px rgba(60,150,190,.10) inset}
  body.hijacked.deep .card.corrupt h3{color:#7fd4e8}
  body.hijacked.deep .card.corrupt .tag{color:#5ab8d0;border-color:#5ab8d0}
  body.hijacked.deep .disconnect{border-color:#5ab8d0;color:#5ab8d0}
  body.hijacked.deep .disconnect:hover{background:#5ab8d0;color:#02141f}

  .card.zoomscare{animation:zoomin .55s cubic-bezier(.2,1.4,.3,1)}
  @keyframes zoomin{0%{transform:scale(.08);opacity:0}55%{transform:scale(1.55);opacity:1}100%{transform:scale(1);opacity:1}}

  /* persistent scanlines when hijacked */
  body.hijacked #tablet::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px);
  }

  /* ---------- overlays (boot / story / end) ---------- */
  .overlay{
    position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px;
    background:#0d1117;color:#dce3ec;cursor:pointer;
  }
  .overlay.hidden{display:none}
  #boot .logo{font-size:34px;letter-spacing:.4em;font-weight:200;margin-bottom:8px;font-family:"SF Mono",Consolas,monospace}
  #boot .logo b{font-weight:700}
  #boot .slogan{color:#7d8899;font-size:14px;letter-spacing:.2em;margin-bottom:50px}
  #boot .tap{font-size:13px;color:#5a6472;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  #story{background:rgba(8,10,14,.96)}
  #storytext{max-width:520px;font-size:16px;line-height:2.1;min-height:120px}
  #storytext .who{display:block;font-size:12px;letter-spacing:.25em;color:#6f7a89;margin-bottom:10px}
  #storytext.narr{color:#9aa5b4;font-style:normal}
  #storytext.recep .who{color:#7fb2e5}
  #storytext.xiaoya .who{color:#e5a7b8}
  #storytext.sys{font-family:"SF Mono",Consolas,monospace;color:#8fd3c7}
  #storytext.sys .who{color:#4a9a8a}
  #storynext{margin-top:40px;font-size:12px;color:#525c6a;letter-spacing:.2em;animation:pulse 2s infinite}

  #endscreen{background:#050308;color:#cbb8bc}
  #endscreen h1{font-size:30px;font-weight:300;letter-spacing:.5em;margin-bottom:20px;text-indent:.5em}
  #endscreen .t333{font-family:"SF Mono",Consolas,monospace;color:#c1121f;font-size:20px;letter-spacing:.3em;margin:18px 0;animation:pulse 1.6s infinite}
  #endscreen p{font-size:14px;line-height:2;color:#8a7a80;max-width:460px}
  #endbtns{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  #endscreen button{
    border:1px solid #6a5058;background:transparent;color:#cbb8bc;
    padding:10px 30px;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.15em;
  }
  #endscreen button:disabled{opacity:.35;cursor:default}

  /* ---------- ch2 scare fx: rot / freeze / silence ---------- */
  body.rotting #tablet{animation:rotfade 1.7s forwards}
  @keyframes rotfade{
    0%{filter:none}
    40%{filter:hue-rotate(30deg) saturate(.9) brightness(.9)}
    100%{filter:hue-rotate(65deg) saturate(.55) contrast(1.25) brightness(.55)}
  }
  body.hijacked.mold{background:linear-gradient(160deg,#070a03 0%,#111605 100%)}
  body.hijacked.mold #tablet{background:#0c1105;box-shadow:0 30px 90px rgba(90,120,20,.35);filter:none}
  body.hijacked.mold #searchbox{background:#10160a;border-color:#2a3a12}
  body.hijacked.mold .card.corrupt{background:#0d1206;border-color:#2a3a12;box-shadow:0 0 30px rgba(140,180,60,.10) inset}
  body.hijacked.mold .card.corrupt h3{color:#b7d075}
  body.hijacked.mold .card.corrupt .tag{color:#86b049;border-color:#86b049}
  body.hijacked.mold .disconnect{border-color:#86b049;color:#86b049}
  body.hijacked.mold .disconnect:hover{background:#86b049;color:#0c1105}

  #frostveil{
    position:fixed;inset:0;z-index:70;pointer-events:none;opacity:0;transition:opacity 1.4s;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 34%, rgba(215,238,255,.30) 72%, rgba(235,248,255,.65) 100%),
      repeating-conic-gradient(from 12deg, rgba(255,255,255,.05) 0 2deg, transparent 2deg 17deg);
  }
  body.cold #frostveil{opacity:1}
  body.hijacked.cold{background:linear-gradient(160deg,#0a0f16 0%,#16222e 100%)}
  body.hijacked.cold #tablet{background:#0d141c;box-shadow:0 30px 90px rgba(80,140,190,.35)}
  body.hijacked.cold #searchbox{background:#101a24;border-color:#2a4258}
  body.hijacked.cold .card.corrupt{background:#0e1620;border-color:#2a4258;box-shadow:0 0 30px rgba(150,200,240,.10) inset}
  body.hijacked.cold .card.corrupt h3{color:#cfe8ff}
  body.hijacked.cold .card.corrupt .tag{color:#8fc7ee;border-color:#8fc7ee}
  body.hijacked.cold .disconnect{border-color:#8fc7ee;color:#8fc7ee}
  body.hijacked.cold .disconnect:hover{background:#8fc7ee;color:#0d141c}

  body.hijacked.silent{background:#000}
  body.hijacked.silent #tablet{background:#060606;border-color:#000;box-shadow:none}
  body.hijacked.silent #searchbox{background:#0b0b0b;border-color:#1e1e1e}
  body.hijacked.silent .card.corrupt{background:#0a0a0a;border-color:#242424;box-shadow:none}
  body.hijacked.silent .card.corrupt h3{color:#bdbdbd}
  body.hijacked.silent .card.corrupt .tag{color:#8a8a8a;border-color:#8a8a8a}
  body.hijacked.silent .disconnect{border-color:#8a8a8a;color:#8a8a8a}
  body.hijacked.silent .disconnect:hover{background:#8a8a8a;color:#0a0a0a}
  .card.slowfade{animation:slowfade 3.2s ease both}
  @keyframes slowfade{0%{opacity:0}60%{opacity:0}100%{opacity:1}}
  body.vanish #results,body.vanish #hintline,body.vanish #statusbar{animation:vanish .4s forwards}
  @keyframes vanish{to{opacity:0}}
  body.hijacked #statusbar,body.hijacked #results{opacity:1;animation:none}

  /* ---------- ch3 scare fx: mirror flip / flashlight dark ---------- */
  #tablet{will-change:transform}
  body.mirrored #tablet{transform:scaleX(-1);filter:saturate(.4) brightness(1.05)}
  body:not(.mirrored) #tablet{transition:transform .5s ease, filter .5s}
  body.mirrored #tablet{transition:transform .5s ease, filter .5s}

  body.hijacked.silver{background:linear-gradient(160deg,#0e1014 0%,#1c2026 100%)}
  body.hijacked.silver #tablet{background:#12151a;box-shadow:0 30px 90px rgba(150,170,200,.25)}
  body.hijacked.silver #searchbox{background:#171b21;border-color:#3a404a}
  body.hijacked.silver .card.corrupt{background:#14171c;border-color:#3a404a;box-shadow:0 0 30px rgba(200,215,235,.08) inset}
  body.hijacked.silver .card.corrupt h3{color:#dfe5ee}
  body.hijacked.silver .card.corrupt .tag{color:#aeb8c6;border-color:#aeb8c6}
  body.hijacked.silver .disconnect{border-color:#aeb8c6;color:#aeb8c6}
  body.hijacked.silver .disconnect:hover{background:#aeb8c6;color:#12151a}

  #torchveil{
    position:fixed;inset:0;z-index:75;pointer-events:none;opacity:0;transition:opacity .3s;
    background:radial-gradient(circle 150px at 50% 45%, transparent 0 100px, rgba(0,0,0,.97) 190px);
  }
  body.torch #torchveil{opacity:1;animation:torchroam 2.4s steps(1) forwards}
  @keyframes torchroam{
    0%  {background:radial-gradient(circle 150px at 22% 24%, transparent 0 100px, rgba(0,0,0,.97) 190px)}
    28% {background:radial-gradient(circle 150px at 74% 30%, transparent 0 100px, rgba(0,0,0,.97) 190px)}
    55% {background:radial-gradient(circle 150px at 38% 72%, transparent 0 100px, rgba(0,0,0,.97) 190px)}
    80%,100%{background:radial-gradient(circle 170px at 50% 46%, transparent 0 120px, rgba(0,0,0,.97) 210px)}
  }
  body.hijacked.noir{background:#020202}
  body.hijacked.noir #tablet{background:#070707;border-color:#000;box-shadow:none}
  body.hijacked.noir #searchbox{background:#0d0d0b;border-color:#2c2a20}
  body.hijacked.noir .card.corrupt{background:#0b0b09;border-color:#2c2a20;box-shadow:none}
  body.hijacked.noir .card.corrupt h3{color:#e8dc9a}
  body.hijacked.noir .card.corrupt .tag{color:#d8c766;border-color:#d8c766}
  body.hijacked.noir .disconnect{border-color:#d8c766;color:#d8c766}
  body.hijacked.noir .disconnect:hover{background:#d8c766;color:#0b0b09}

  .portalbtn{
    display:block;margin:16px auto 4px;border:1px solid #4a90d9;background:transparent;
    color:#4a90d9;border-radius:10px;padding:10px 26px;font-size:14px;cursor:pointer;
    font-family:inherit;letter-spacing:.1em;
  }
  .portalbtn:hover{background:#4a90d9;color:#fff}

  /* ---------- ch4: through-the-mirror ripple + mirror world ---------- */
  @keyframes rippleT{
    0%{transform:scale(1)}
    25%{transform:scale(1.03,.97)}
    50%{transform:scale(.97,1.03);filter:blur(2px)}
    75%{transform:scale(1.02,.98);filter:blur(.5px)}
    100%{transform:scale(1)}
  }
  body.rippling #tablet{animation:rippleT 1.4s ease}
  #rippleveil{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:70;pointer-events:none}
  body.rippling #rippleveil{display:flex}
  #rippleveil .ring{
    position:absolute;border:2px solid rgba(160,200,255,.55);border-radius:50%;
    width:40px;height:40px;opacity:0;animation:ringout 1.2s ease-out forwards;
  }
  #rippleveil .ring:nth-child(2){animation-delay:.25s;border-color:rgba(160,200,255,.35)}
  #rippleveil .ring:nth-child(3){animation-delay:.5s;border-color:rgba(160,200,255,.2)}
  @keyframes ringout{0%{opacity:1;transform:scale(.2)}100%{opacity:0;transform:scale(22)}}

  /* mirror world: persistent cold inverted theme (not a hijack) */
  body.mw{background:linear-gradient(160deg,#0e1014 0%,#1a1e26 100%)}
  body.mw #tablet{background:#141821;border-color:#000;color:#ccd6e4;box-shadow:0 30px 80px rgba(120,150,200,.2)}
  body.mw #statusbar{color:#6b7686}
  body.mw #searchbox{background:#1a2029;border-color:#39404d}
  body.mw #query::placeholder{color:#4d5766}
  body.mw #gobtn{background:#39404d}
  body.mw #hintline{color:#6b7686}
  body.mw .card{background:#181d26;border-color:#39404d;color:#ccd6e4}
  body.mw .card .sub{color:#7d8898}
  body.mw .card .tag{color:#8fa8c8;border-color:#8fa8c8}
  body.mw #results::-webkit-scrollbar-thumb{background:#39404d}
  body.mw #cluebtn{background:#1a2029;color:#8fa8c8}
  body.mw #cluepanel{background:#141821;border-color:#39404d;color:#ccd6e4}

  /* ---------- ch5: countdown & rooftop ritual ---------- */
  #clock.kt{color:#ff5470;animation:pulse 1.2s infinite;font-weight:600}
  .dimmerwrap{display:flex;align-items:center;gap:12px;margin-top:10px;font-size:12px;color:var(--sub)}
  .dimmerwrap input[type=range]{flex:1;accent-color:var(--accent)}
  .ritebtns{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
  .ritebtn{
    flex:1;min-width:110px;padding:14px 8px;background:transparent;cursor:pointer;
    border:1px solid var(--accent);color:var(--accent);border-radius:10px;
    font-family:"SF Mono",Consolas,monospace;font-size:14px;letter-spacing:.25em;
    transition:all .25s;
  }
  .ritebtn:hover{background:var(--accent);color:#fff}
  .ritelog{margin-top:12px;font-size:13px;line-height:1.9;min-height:26px}

  /* ---------- developer mode ---------- */
  #devgate{
    position:absolute;inset:0;z-index:95;display:none;align-items:center;justify-content:center;
    background:rgba(0,8,0,.88);
  }
  #devgate.show{display:flex}
  .devbox{
    background:#050d05;border:1px solid #2f7a2f;border-radius:12px;padding:28px 36px;
    text-align:center;font-family:"SF Mono",Consolas,monospace;color:#7dff9e;
  }
  .devbox h4{font-size:13px;letter-spacing:.3em;margin-bottom:16px;font-weight:normal}
  .devbox input{
    background:#020a02;border:1px solid #2f7a2f;border-radius:8px;color:#7dff9e;
    font-family:inherit;font-size:18px;letter-spacing:.5em;text-align:center;
    width:150px;padding:8px;outline:none;
  }
  .devbox .devbtns{margin-top:16px;display:flex;gap:10px;justify-content:center}
  .devbox button{

<script>
/* =====================  STATE  ===================== */
const S = {
  stage: 0,          // 0 start, 1 saw hotel page, 2 saw death log, 3 saw cctv, 4 saw altar
  searches: 0,
  fails: 0,
  muted: false,
  locked: false,     // input locked during fx
  yaScared: false,   // one-time zoom scare used
  seenRoom: false,   // 0413 room profile viewed
  seenCard: false,   // welcome card embossing viewed
  seenCCTV: false,   // cctv footage viewed
  seenAlbum: false,  // grandma photo viewed
  seenGranny: false, // grandma's expelled-member archive viewed
  mw: false,         // inside the mirror world (ch4)
  ktOn: false,       // ch5 hard countdown running
  kt: 210,           // minutes left until 03:33 (one search = one 刻 = 15 min)
  seenPool: false,   // ch5: rooftop scene viewed
  seenMoon: false,   // ch5: water-is-mirror card viewed
  seenEyes: false,   // ch5: brightness slider pulled to max
  named43: false,    // ch5: 周明远's name given to the well
  morse: false,      // ch5: well-bottom knocking egg used (+一刻)
  riteStep: 0,       // ch5: ritual progress (rope→moon→name)
  ch5done: false,    // ch5: soul guided back
  hintKey: '',       // two-level hint tracking
  hintLv: 0,
  clues: [],
};
/* fresh boot = fresh timeline: clear cross-window ending marks */
try{ localStorage.removeItem('glimmer_end'); localStorage.removeItem('sst_pai'); }catch(e){}
const $ = id => document.getElementById(id);
const results = $('results'), query = $('query'), hintline = $('hintline');

/* =====================  AUDIO  ===================== */
let AC = null;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function sfxGlitch(dur=1.1){
  if(S.muted) return; const ctx = ac(); if(!ctx) return;
  const t = ctx.currentTime;
  // noise burst
  const len = ctx.sampleRate*dur, buf = ctx.createBuffer(1,len,ctx.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len,1.5);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=.6;
  const g = ctx.createGain(); g.gain.setValueAtTime(.28,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.connect(bp).connect(g).connect(ctx.destination); src.start(t);
  // low drone
  const o = ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(46,t);
  const g2 = ctx.createGain(); g2.gain.setValueAtTime(.12,t); g2.gain.exponentialRampToValueAtTime(.001,t+dur*1.6);
  o.connect(g2).connect(ctx.destination); o.start(t); o.stop(t+dur*1.7);
}
function sfxSting(vol=1){
  /* sharp shriek for sudden-appear scares */
  if(S.muted) return; const ctx = ac(); if(!ctx) return; const t = ctx.currentTime;
  [880,932,1244].forEach(f => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(f*.5,t); o.frequency.exponentialRampToValueAtTime(f*2.2,t+.32);
    g.gain.setValueAtTime(.11*vol,t); g.gain.exponentialRampToValueAtTime(.001,t+.5);
    o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+.55);
  });
  const len = ctx.sampleRate*.15, buf = ctx.createBuffer(1,len,ctx.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = .22*vol;
  src.connect(g).connect(ctx.destination); src.start(t);
}
function sfxFall(){
  /* descending pitch + bubbling — sinking underwater */
  if(S.muted) return; const ctx = ac(); if(!ctx) return; const t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(36,t+1.5);
  g.gain.setValueAtTime(.2,t); g.gain.exponentialRampToValueAtTime(.001,t+1.8);
  o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+1.9);
  const len = ctx.sampleRate*1.6, buf = ctx.createBuffer(1,len,ctx.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*.6*Math.sin(i/len*Math.PI);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const lp = ctx.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(700,t); lp.frequency.exponentialRampToValueAtTime(120,t+1.6);
  const g2 = ctx.createGain(); g2.gain.value = .16;
  src.connect(lp).connect(g2).connect(ctx.destination); src.start(t);
}
function sfxFlies(){
  /* fly-swarm buzz for the rot scare */
  if(S.muted) return; const ctx = ac(); if(!ctx) return; const t = ctx.currentTime, dur = 1.8;
  [92,117].forEach(f => {
    const o = ctx.createOscillator(), g = ctx.createGain(), lfo = ctx.createOscillator(), lg = ctx.createGain();
    o.type='sawtooth'; o.frequency.value = f;
    lfo.type='sine'; lfo.frequency.value = 7 + Math.random()*4; lg.gain.value = .05;
    lfo.connect(lg).connect(g.gain);
    g.gain.setValueAtTime(.07,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g).connect(ctx.destination);
    o.start(t); o.stop(t+dur); lfo.start(t); lfo.stop(t+dur);
  });
}
function sfxFreeze(){
  /* ice cracks + thin shimmer */
  if(S.muted) return; const ctx = ac(); if(!ctx) return; const t = ctx.currentTime;
  [0,.38,.85].forEach(dt => {
    const len = ctx.sampleRate*.06, buf = ctx.createBuffer(1,len,ctx.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 2400;
    const g = ctx.createGain(); g.gain.value = .3;
    src.connect(hp).connect(g).connect(ctx.destination); src.start(t+dt);
  });
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(2600,t); o.frequency.exponentialRampToValueAtTime(1400,t+1.6);
  g.gain.setValueAtTime(.05,t); g.gain.exponentialRampToValueAtTime(.001,t+1.6);
  o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+1.7);
}
function sfxShimmer(){
  /* glassy rising shimmer for the mirror flip */
  if(S.muted) return; const ctx = ac(); if(!ctx) return; const t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(500,t); o.frequency.exponentialRampToValueAtTime(2600,t+1.2);
  g.gain.setValueAtTime(.07,t); g.gain.exponentialRampToValueAtTime(.001,t+1.4);
  o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+1.5);
  [1800,2300,2750].forEach((f,i) => {
    const p = ctx.createOscillator(), pg = ctx.createGain();
    p.type='triangle'; p.frequency.value = f;
    pg.gain.setValueAtTime(.09,t+.3+i*.32); pg.gain.exponentialRampToValueAtTime(.001,t+.3+i*.32+.25);
    p.connect(pg).connect(ctx.destination); p.start(t+.3+i*.32); p.stop(t+.3+i*.32+.3);
  });
}
function sfxHeart(){
  /* slow double heartbeats in the dark */
  if(S.muted) return; const ctx = ac(); if(!ctx) return; const t = ctx.currentTime;
  for(let b=0;b<3;b++){
    [0,.22].forEach(dd => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(58,t+b*.85+dd);
      g.gain.setValueAtTime(dd? .18:.26, t+b*.85+dd);
      g.gain.exponentialRampToValueAtTime(.001, t+b*.85+dd+.14);
      o.connect(g).connect(ctx.destination); o.start(t+b*.85+dd); o.stop(t+b*.85+dd+.16);
    });
  }
}
function sfxPlunge(){
  /* soft watery whoosh — passing through the mirror surface */
  if(S.muted) return; const ctx = ac(); if(!ctx) return; const t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(55,t+.9);
  g.gain.setValueAtTime(.16,t); g.gain.exponentialRampToValueAtTime(.001,t+1.1);
  o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+1.2);
  const len = ctx.sampleRate*1.1, buf = ctx.createBuffer(1,len,ctx.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*.5*Math.sin(i/len*Math.PI);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const lp = ctx.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(1200,t); lp.frequency.exponentialRampToValueAtTime(200,t+1.1);
  const g2 = ctx.createGain(); g2.gain.value = .12;
  src.connect(lp).connect(g2).connect(ctx.destination); src.start(t);
}
function sfxKey(){
  if(S.muted) return; const ctx = ac(); if(!ctx) return;
  const t = ctx.currentTime, o = ctx.createOscillator(), g = ctx.createGain();
  o.type='square'; o.frequency.value = 620 + Math.random()*300;
  g.gain.setValueAtTime(.05,t); g.gain.exponentialRampToValueAtTime(.001,t+.06);
  o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+.07);
}
$('mutebtn').onclick = () => { S.muted = !S.muted; $('mutebtn').textContent = S.muted?'🔇':'🔊'; };

/* =====================  CLOCK  ===================== */
const TITLE0 = document.title;
function updateClock(){
  const el = $('clock');
  if(S.ktOn){
    /* ch5 hard countdown: one search = one 刻 (15 min), 03:33 the well opens */
    const h = Math.floor(S.kt/60), m = String(S.kt%60).padStart(2,'0');
    el.textContent = '距井开 ' + h + ':' + m;
    el.classList.add('kt');
    document.title = '【距井开 ' + h + ':' + m + '】微光管家';
    return;
  }
  el.classList.remove('kt');
  if(S.stage >= 19){ el.textContent = '03:33'; document.title = TITLE0; return; }
  // fictional in-game evening clock, creeps toward 03:33 as stages advance
  const base = [ '21:47','22:31','23:58','01:12','02:59','08:12','10:26','13:40','16:55','18:03','09:12','13:26','20:41','23:57','19:05','21:40','21:45','22:47','23:59' ][Math.min(S.stage,18)];
  /* in the mirror world, time runs backwards — the title too */
  el.textContent = S.mw ? base.split('').reverse().join('') : base;
  document.title = S.mw ? TITLE0.split('').reverse().join('') : TITLE0;
}
(function tick(){ updateClock(); setTimeout(tick, 4000); })();

/* =====================  CLUES  ===================== */
function addClue(text){
  if(S.clues.includes(text)) return;
  S.clues.push(text);
  const li = document.createElement('li'); li.textContent = text;
  $('cluelist').appendChild(li);
  $('clueempty').style.display='none';
  $('cluedot').style.display='block';
}
$('cluebtn').onclick = () => {
  const p = $('cluepanel');
  p.style.display = p.style.display==='block' ? 'none':'block';
  $('cluedot').style.display='none';
};

/* =====================  STORY OVERLAY  ===================== */
function showStory(beats, done){
  const ov = $('story'), tx = $('storytext');
  let i = 0; ov.classList.remove('hidden'); S.locked = true;
  function render(){
    const b = beats[i];
    tx.className = b.cls||'narr';
    tx.innerHTML = (b.who?`<span class="who">${b.who}</span>`:'') + b.text;
  }
  render();
  ov.onclick = () => {
    i++;
    if(i>=beats.length){ ov.classList.add('hidden'); ov.onclick=null; S.locked=false; if(done) done(); }
    else render();
  };
}

/* =====================  BOOT + INTRO  ===================== */
$('boot').addEventListener('click', () => {
  ac(); // unlock audio with gesture
  $('boot').classList.add('hidden');
  showStory([
    {cls:'narr', text:'大堂明亮得有些刺眼，冷白色调。<br>前台小姐的笑容非常标准——标准到有些僵硬。'},
    {cls:'recep', who:'前台', text:'“王先生、林小姐，欢迎入住<b>微光度假村</b>。这是您的房卡，0413 房。”'},
    {cls:'recep', who:'前台', text:'“我们酒店全面接入了「微光管家」系统。订餐、找设施、任何疑问，直接在搜索框输入即可——<br>它比任何真人都更了解这间酒店。”'},
    {cls:'xiaoya', who:'小雅', text:'“哇，你看窗外，顶楼是无边泳池诶！<br>今晚先吃自助，明天我要拍一整天照片！”'},
    {cls:'narr', text:'房间极其现代化。桌上放着一台极简风格的平板，<br>屏幕上只有一个干净的搜索框，闪烁着：'},
    {cls:'sys', who:'GLIMMER OS', text:'“微光，知你所求。”<br><br><span style="opacity:.55">// 试着搜索点什么吧，比如这家酒店的名字。</span>'},
  ], () => {
    hint('小雅去洗手间了。你盯着搜索框——要不，先搜搜「微光度假村」？');
    addClue('酒店名：微光度假村（The Glimmer Resort）');
    query.focus();
  });
});

/* =====================  HINT LINE  ===================== */
function hint(t){ hintline.textContent = t; }

/* 两级提示：level 1 给方向（谜面），level 2 给答案 */
function getHint(level){
  const st = S.stage;
  if(st === 0) return level===1 ? '这家酒店的一切，都从它的名字开始。' : '搜索「微光度假村」。';
  if(st === 1) return level===1 ? '宣传页说：46 层，客梯全楼直达，按键全在图里。那就数数看——少了哪一层？' : '搜索「44」。';
  if(st === 2){
    if(!S.seenRoom) return level===1 ? '名字被抹掉了，可房号没有。日志里反复出现的那个房号——就是你自己的房间。' : '搜索「0413」。';
    if(!S.seenCard) return level===1 ? '房间履历说，前住客留下了一样东西。回收失败，还在床头。' : '搜索「欢迎卡」。';
    return level===1 ? '把卡片对着光。压痕是两个字——一个姓，一个名。认出来，搜它。' : '搜索「陈婷」。';
  }

/* =====================  HIJACK FX  ===================== */
/* mode: 'glitch' 震动变红 | 'blackout' 黑屏→闪脸 | 'fall' 坠落沉水
        | 'rot' 页面腐烂发霉 | 'freeze' 灯光爆闪→白霜 | 'silence' 万物噤声
   replay=true 时跳过惊吓动画直接出结果（防止重复刺激脱敏） */
function hijack(renderFn, after, mode='glitch', replay=false){
  S.locked = true;
  if(replay){
    const themeOf = {rot:'mold', freeze:'cold', fall:'deep', silence:'silent', mirror:'silver', dark:'noir'};
    /* defined below via hoisting-safe inline: fall through to finish */
    setTimeout(() => finishReplay(themeOf[mode] || null), 50);
  }
  function finishReplay(extraClass){
    document.body.classList.add('hijacked');
    if(extraClass) document.body.classList.add(extraClass);
    const el = renderFn();
    const btn = el.querySelector('.disconnect');
    if(btn){
      btn.onclick = () => {
        document.body.classList.remove('hijacked','deep','mold','cold','silent','silver','noir');
        S.locked = false; if(after) after();
      };
    } else { S.locked = false; if(after) after(); }
  }
  if(replay) return;
  const finish = (extraClass, cardClass) => {
    document.body.classList.add('hijacked');
    if(extraClass) document.body.classList.add(extraClass);
    const el = renderFn();
    if(cardClass) el.classList.add(cardClass);
    const btn = el.querySelector('.disconnect');
    if(btn){
      btn.onclick = () => {
        document.body.classList.add('glitching');
        sfxGlitch(.4);
        setTimeout(() => {
          document.body.classList.remove('glitching','hijacked','deep','mold','cold','silent','silver','noir');
          S.locked = false;
          if(after) after();
        }, 380);
      };
    } else { S.locked = false; if(after) after(); }
  };
  if(mode === 'mirror'){
    /* the whole UI flips like a mirror image, then flips back into a silver world */
    document.body.classList.add('mirrored');
    sfxShimmer();
    setTimeout(() => {
      document.body.classList.remove('mirrored');
      setTimeout(() => finish('silver'), 480);
    }, 1500);
  } else if(mode === 'dark'){
    /* lights die; a flashlight beam roams the darkness to your heartbeat */
    document.body.classList.add('torch');
    sfxHeart();
    setTimeout(() => {
      finish('noir');
      setTimeout(() => document.body.classList.remove('torch'), 1400);
    }, 2100);
  } else if(mode === 'rot'){
    /* the page you're reading starts to decay */
    document.body.classList.add('rotting');
    sfxFlies();
    setTimeout(() => {
      document.body.classList.remove('rotting');
      finish('mold');
    }, 1700);
  } else if(mode === 'freeze'){
    /* lights blow out twice, then frost creeps in */
    const b = document.body;
    b.classList.add('blackout');
    setTimeout(() => { b.classList.remove('blackout');
    setTimeout(() => { b.classList.add('blackout');
    setTimeout(() => { b.classList.remove('blackout');
      sfxFreeze();
      b.classList.add('cold');
      setTimeout(() => finish('cold'), 900);
    }, 160); }, 220); }, 120);
  } else if(mode === 'silence'){
    /* no sound at all — everything on screen simply ceases */
    document.body.classList.add('vanish');
    setTimeout(() => {
      results.innerHTML = '';
      document.body.classList.remove('vanish');
      finish('silent', 'slowfade');
    }, 900);
  } else if(mode === 'blackout'){
    /* sudden dead screen — a beat of silence — face flash with sting — gone */
    document.body.classList.add('blackout');
    setTimeout(() => {
      document.body.classList.add('faceflash');
      sfxSting();
      setTimeout(() => {
        document.body.classList.remove('faceflash');
        setTimeout(() => {
          document.body.classList.remove('blackout');
          finish();
        }, 550);
      }, 220);
    }, 1100);
  } else if(mode === 'fall'){
    /* every card drops off screen, UI sinks into deep water */
    document.body.classList.add('falling');
    sfxFall();
    setTimeout(() => {
      results.innerHTML = '';
      document.body.classList.remove('falling');
      finish('deep');
    }, 1050);
  } else {
    document.body.classList.add('glitching');
    sfxGlitch(1.3);
    setTimeout(() => {
      document.body.classList.remove('glitching');
      finish();
    }, 1300);
  }
}

/* ghost auto-typing in the search box */
function ghostType(msg, done){
  S.locked = true; query.blur(); query.value='';
  let i = 0;
  (function step(){
    if(i < msg.length){
      query.value += msg[i++]; sfxKey();
      setTimeout(step, 140 + Math.random()*220);
    } else {
      setTimeout(() => { query.value=''; S.locked = false; if(done) done(); }, 1600);
    }
  })();
}

function onSearch(){

      + (S.seenPool?1:0) + (S.seenMoon?1:0) + (S.seenEyes?1:0);

    const lvl = S.hintLv;
    butler('（系统外·提示' + (lvl===1?'①':'②·答案') + '）' + getHint(lvl)

    return;

function devJump(i){
  const p = DEVPTS[i];
  /* clean any fx / overlay state so the jump is always safe */
  document.body.classList.remove('hijacked','deep','mold','cold','silent','silver','noir',
    'glitching','mirrored','torch','blackout','faceflash','vanish','falling','rotting','mw','rippling');
  $('boot').classList.add('hidden');
  const ov = $('story'); ov.classList.add('hidden'); ov.onclick = null;
  $('endscreen').classList.add('hidden');
  S.locked = false;
  S.stage = p.stage;
  S.seenRoom = !!p.room;
  S.seenCard = !!p.card;
  S.seenCCTV = !!p.cctv;
  S.seenGranny = p.stage >= 13;
  S.seenAlbum = p.stage >= 13;
  S.mw = !!p.mwx;
  if(S.mw) document.body.classList.add('mw');
  /* ch5 state */
  S.seenPool = !!p.pool; S.seenMoon = !!p.moon; S.seenEyes = !!p.eyes;
  S.named43 = false; S.morse = false; S.riteStep = 0;
  S.ch5done = p.stage >= 23;
  S.ktOn = p.stage >= 19 && p.stage < 23;
  S.kt = p.kt || 210;
  if(p.stage >= 15){ try{ localStorage.setItem('sst_pai','044'); }catch(e){} }
  updateClock();
  S.fails = 0; S.hintKey = ''; S.hintLv = 0;
  hint('');
  $('devlabel').textContent = p.label;
  /* live-render this checkpoint's content (no scare animations) */
  results.innerHTML = '';
  if(p.r){
    const el = p.r();
    /* re-assert checkpoint state: renderers may bump stage/flags */
    S.stage = p.stage; S.seenRoom = !!p.room; S.seenCard = !!p.card; S.seenCCTV = !!p.cctv;
    hint('');
    if(el && el.querySelector){
      const b = el.querySelector('.disconnect');
      if(b && b.remove) b.remove();   /* corrupt cards shown inline, no disconnect needed */
    }
  }
  query.focus();
}
$('devok').onclick = () => {
  if($('devpw').value === '0916'){
    $('devgate').classList.remove('show');
    document.body.classList.add('dev');
    /* sync slider to current progress */
    let idx = 0;
    for(let i = 0; i < DEVPTS.length; i++){ if(DEVPTS[i].stage <= S.stage) idx = i; }
    if(S.stage === 2){ idx = 2 + (S.seenRoom?1:0) + (S.seenCard?1:0); }
    $('devrange').value = idx;
    $('devlabel').textContent = DEVPTS[idx].label;
  } else {
    $('deverr').textContent = 'ACCESS DENIED';
    $('devpw').value = '';
  }
};
$('devcancel').onclick = () => $('devgate').classList.remove('show');
$('devpw').addEventListener('keydown', e => { if(e.key === 'Enter') $('devok').onclick(); });
/* real-time jump while dragging (120ms debounce so it doesn't thrash) */
let devT = null;
function devSlide(e){
  const i = +e.target.value;
  $('devlabel').textContent = DEVPTS[i].label;
  clearTimeout(devT);
  devT = setTimeout(() => devJump(i), 120);
}
$('devrange').addEventListener('input', devSlide);
$('devrange').addEventListener('change', devSlide);
$('devclose').onclick = () => document.body.classList.remove('dev');
